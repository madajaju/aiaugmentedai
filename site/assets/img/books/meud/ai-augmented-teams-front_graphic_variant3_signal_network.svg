      .connThin { stroke:url(#connGrad); stroke-width:2.3; stroke-linecap:round; opacity:0.13; }
      .activeLineGlow { stroke:url(#connGrad); stroke-width:10.4; stroke-linecap:round; opacity:0.7; filter:url(#softGlow); }
      .activeLine { stroke:#FFE2A3; stroke-width:5.4; stroke-linecap:round; opacity:0.82; }
      .mesh { stroke:#76B6FF; stroke-width:1.6; stroke-linecap:round; opacity:0.22; }
    </style>
