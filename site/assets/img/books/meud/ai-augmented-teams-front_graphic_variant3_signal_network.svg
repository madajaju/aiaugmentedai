      .hex2 { stroke:url(#hexGrad); stroke-width:2.8; stroke-linejoin:round; fill:none; opacity:0.25; }
      .activeHex { stroke:url(#hexGrad); stroke-width:7.0; stroke-linejoin:round; opacity:0.62; fill:url(#centerFill); fill-opacity:0.22; }
