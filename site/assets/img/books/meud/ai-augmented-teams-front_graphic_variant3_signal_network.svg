  <defs>
    <linearGradient id="hexGrad" x1="300" y1="300" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#53A8FF"/>
      <stop offset="55%" stop-color="#8DC7FF"/>
      <stop offset="100%" stop-color="#F4C56E"/>
    </linearGradient>
    <linearGradient id="connGrad" x1="350" y1="350" x2="850" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#53A8FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F4C56E" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3F74D9" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#1D3565" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerFill" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#FFF6D8" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8EC9FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2A447A" stop-opacity="0.01"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tightGlow" x="0%" y="0%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="activeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="15.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="activeSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="activeNodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4.2" result="blur"/>
      <feOffset in="blur" dx="0" dy="0" result="offsetBlur"/>
      <feFlood flood-color="#F4C56E" flood-opacity="0.28" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset in="blur" dx="0" dy="12" result="offsetBlur"/>
      <feFlood flood-color="#0C1733" flood-opacity="0.5" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
